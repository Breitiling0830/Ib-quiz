<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="國企刷題">
<meta name="theme-color" content="#ffffff">
<title>國際企業管理刷題</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%8C%8F%3C/text%3E%3C/svg%3E">
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "PingFang TC", "Microsoft JhengHei", "Helvetica Neue", sans-serif;
    background: #f5f5f0;
    color: #1f1f1d;
    line-height: 1.6;
    font-size: 15px;
    padding: 16px;
    max-width: 600px;
    margin: 0 auto;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }
  h1 { font-size: 22px; font-weight: 600; margin: 8px 0 16px; }
  h2 { font-size: 17px; font-weight: 600; margin: 20px 0 10px; color: #555; }
  .stat-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 16px; }
  .stat-card { background: #ffffff; border-radius: 12px; padding: 14px; border: 1px solid #e8e6df; }
  .stat-label { font-size: 12px; color: #888; margin-bottom: 4px; }
  .stat-num { font-size: 24px; font-weight: 600; color: #1f1f1d; }
  .search-wrap { margin-bottom: 16px; }
  .search-input {
    width: 100%; padding: 11px 14px; background: #ffffff; border: 1px solid #e8e6df;
    border-radius: 12px; font-size: 15px; font-family: inherit; color: #1f1f1d;
    -webkit-appearance: none; appearance: none; outline: none; transition: border-color 0.15s;
  }
  .search-input:focus { border-color: #185fa5; }
  #search-results { margin-top: 10px; display: none; }
  .search-count { font-size: 12px; color: #888; padding: 4px 4px 8px; }
  .search-empty { padding: 16px; text-align: center; font-size: 13px; color: #888; background: #ffffff; border: 1px solid #e8e6df; border-radius: 10px; }
  .search-item { background: #ffffff; border: 1px solid #e8e6df; border-radius: 10px; padding: 11px 13px; margin-bottom: 6px; cursor: pointer; transition: background 0.15s, transform 0.1s; }
  .search-item:active { transform: scale(0.99); background: #f5f5f0; }
  .search-item-meta { font-size: 11px; color: #888; margin-bottom: 3px; }
  .search-item-stem { font-size: 13px; line-height: 1.55; color: #1f1f1d; word-break: break-word; }
  mark { background: #faeeda; color: #854f0b; padding: 0 2px; border-radius: 2px; }
  .badge { font-size: 11px; padding: 2px 8px; border-radius: 999px; }
  .badge-ok { background: #e1f5ee; color: #085041; }
  .badge-no { background: #fcebeb; color: #791f1f; }
  .mode-card { background: #ffffff; border: 1px solid #e8e6df; border-radius: 12px; padding: 16px; margin-bottom: 10px; cursor: pointer; transition: background 0.15s, transform 0.1s; user-select: none; }
  .mode-card:active { transform: scale(0.98); background: #f5f5f0; }
  .mode-card.disabled { opacity: 0.45; pointer-events: none; }
  .mode-card-static { background: #ffffff; border: 1px solid #e8e6df; border-radius: 12px; padding: 16px; margin-bottom: 10px; user-select: none; }
  .count-row { display: flex; align-items: center; gap: 10px; margin-top: 12px; flex-wrap: wrap; }
  .count-label { font-size: 13px; color: #888; }
  .count-pills { display: flex; gap: 6px; flex-wrap: wrap; flex: 1; }
  .count-pill { padding: 6px 12px; background: #f5f5f0; border: 1px solid #e8e6df; border-radius: 999px; font-size: 13px; color: #555; cursor: pointer; font-family: inherit; transition: all 0.15s; }
  .count-pill:active { transform: scale(0.95); }
  .count-pill.active { background: #1f1f1d; color: #ffffff; border-color: #1f1f1d; }
  .mode-title { font-size: 15px; font-weight: 600; margin-bottom: 4px; }
  .mode-desc { font-size: 13px; color: #888; }
  .meta-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; font-size: 12px; color: #888; }
  .progress-bar { height: 4px; background: #e8e6df; border-radius: 2px; overflow: hidden; margin-bottom: 14px; }
  .progress-fill { height: 100%; background: #185fa5; transition: width 0.3s; }
  .q-card { background: #ffffff; border: 1px solid #e8e6df; border-radius: 12px; padding: 16px; margin-bottom: 16px; }
  .q-stem { font-size: 15px; line-height: 1.75; margin-bottom: 14px; word-break: break-word; }
  .opt { display: block; width: 100%; text-align: left; padding: 12px 14px; margin-bottom: 8px; background: #ffffff; border: 1px solid #e8e6df; border-radius: 10px; font-size: 14px; line-height: 1.6; color: #1f1f1d; font-family: inherit; cursor: pointer; transition: background 0.15s, transform 0.1s; word-break: break-word; }
  .opt:active:not(:disabled) { transform: scale(0.98); }
  .opt:disabled { cursor: default; }
  .opt.correct { background: #e1f5ee; border-color: #1d9e75; color: #085041; }
  .opt.wrong { background: #fcebeb; border-color: #e24b4a; color: #791f1f; }
  .opt-key { display: inline-block; width: 22px; font-weight: 600; }
  .explain { margin-top: 14px; padding: 14px; background: #f5f5f0; border-radius: 10px; font-size: 13px; line-height: 1.75; color: #555; white-space: pre-wrap; word-break: break-word; }
  .explain b { color: #1f1f1d; font-weight: 600; display: block; margin-bottom: 6px; }
  .pv-nav { display: flex; align-items: center; gap: 10px; margin-top: 4px; }
  .pv-nav button { flex: 1; padding: 11px; background: transparent; color: #185fa5; border: 1px solid #e8e6df; border-radius: 10px; font-size: 14px; font-family: inherit; cursor: pointer; transition: transform 0.1s; }
  .pv-nav button:active:not(:disabled) { transform: scale(0.97); }
  .pv-nav button:disabled { color: #c4c2ba; cursor: default; }
  .pv-count { font-size: 12px; color: #888; min-width: 56px; text-align: center; }
  .pv-hint { font-size: 11px; color: #aaa; text-align: center; margin-top: 8px; }
  .btn-primary { width: 100%; padding: 13px; background: #1f1f1d; color: #ffffff; border: none; border-radius: 10px; font-size: 15px; font-weight: 500; font-family: inherit; cursor: pointer; margin-top: 14px; transition: opacity 0.15s, transform 0.1s; }
  .btn-primary:active { transform: scale(0.98); opacity: 0.85; }
  .btn-secondary { width: 100%; padding: 11px; background: transparent; color: #888; border: 1px solid #e8e6df; border-radius: 10px; font-size: 13px; font-family: inherit; cursor: pointer; margin-top: 16px; }
  .btn-back { background: transparent; border: none; padding: 8px 0; font-size: 14px; color: #888; cursor: pointer; font-family: inherit; margin-bottom: 6px; }
  .complete { text-align: center; padding: 32px 0; }
  .complete-title { font-size: 20px; font-weight: 600; margin-bottom: 16px; }
  @media (prefers-color-scheme: dark) {
    body { background: #1a1a18; color: #f0efe9; }
    .stat-card, .mode-card, .q-card, .mode-card-static { background: #28272a; border-color: #3a3936; }
    .search-input { background: #28272a; border-color: #3a3936; color: #f0efe9; }
    .search-input:focus { border-color: #378add; }
    .search-item { background: #28272a; border-color: #3a3936; }
    .search-item:active { background: #1a1a18; }
    .search-item-stem { color: #f0efe9; }
    .search-empty { background: #28272a; border-color: #3a3936; }
    mark { background: #633806; color: #fac775; }
    .badge-ok { background: #04342c; color: #9fe1cb; }
    .badge-no { background: #501313; color: #f7c1c1; }
    .count-pill { background: #1a1a18; border-color: #3a3936; color: #b5b3ac; }
    .count-pill.active { background: #f0efe9; color: #1a1a18; border-color: #f0efe9; }
    .stat-num { color: #f0efe9; }
    .stat-label, .mode-desc, .meta-row, .btn-back, .btn-secondary { color: #999; }
    .progress-bar { background: #3a3936; }
    .opt { background: #28272a; border-color: #3a3936; color: #f0efe9; }
    .opt.correct { background: #04342c; border-color: #1d9e75; color: #9fe1cb; }
    .opt.wrong { background: #501313; border-color: #e24b4a; color: #f7c1c1; }
    .explain { background: #1a1a18; color: #b5b3ac; }
    .explain b { color: #f0efe9; }
    .btn-primary { background: #f0efe9; color: #1a1a18; }
    .mode-card:active { background: #1a1a18; }
    .btn-secondary { border-color: #3a3936; }
    .pv-nav button { color: #378add; border-color: #3a3936; }
    .pv-nav button:disabled { color: #555; }
    .pv-count { color: #999; }
    .pv-hint { color: #666; }
  }
</style>
</head>
<body>
<div id="app"></div>

<script>
// ===================================================================
//  國際企業管理刷題 — 題庫資料 (共 180 題，分九章 第六~十四章)
// ===================================================================
const QUESTIONS = [
{ch:6,n:1,stem:"多國公司在地主國營運，除了帶來經濟福祉，還可能在何種面向引發地主國政府的「憂慮」？",opts:["技術移轉","主權獨立","增加就業","資源開發"],ans:1,exp:"多國公司決策中心多在母國，地主國擔心其經濟與政治自主性、亦即主權受到影響。"},
{ch:6,n:2,stem:"根據教材，下列何者「不屬於」管理技術的範疇？",opts:["人事管理","財務管理","行銷管理","原料規格設定"],ans:3,exp:"人事、財務、行銷屬「管理技術」；原料規格設定屬產品/製程技術，不在管理技術範疇。"},
{ch:6,n:3,stem:"在地主國與多國公司的談判中，下列何者屬於「地主國政府」的談判籌碼？",opts:["品牌與專利","市場與天然資源","國際經營網絡","先進管理能力"],ans:1,exp:"地主國握有市場與天然資源作為籌碼；品牌專利、經營網絡、管理能力則是多國公司的籌碼。"},
{ch:6,n:4,stem:"地主國政府採取的貿易障礙理由中，為了保護國內剛起步、尚未具備競爭力的產業，稱之為？",opts:["國家安全論","報復論","扶植幼稚產業","產業轉型論"],ans:2,exp:"保護國內剛起步、尚未具競爭力的產業，是「扶植幼稚產業」的論點。"},
{ch:6,n:5,stem:"下列何者屬於「非關稅障礙」中的數量限制？",opts:["從價稅","配額","產品估價","補貼"],ans:1,exp:"配額直接限制進口數量，屬非關稅障礙中的數量限制。"},
{ch:6,n:6,stem:"所謂「自製率」要求（Local Content Requirements）屬於哪一種障礙類型？",opts:["關稅障礙","出口限制","非關稅障礙","公告價格"],ans:2,exp:"自製率（Local Content）要求一定比例在地生產或採購，屬非關稅障礙。"},
{ch:6,n:7,stem:"泰國負責外人投資相關業務的核心單位為何？",opts:["泰國財政部","泰國投資促進委員會 (BOI)","泰國商務部","泰國中央銀行"],ans:1,exp:"泰國由投資促進委員會（BOI）負責外人投資相關業務。"},
{ch:6,n:8,stem:"根據泰國《外人商業法》，在漁業、農業等特定產業，泰國人必須擁有的股權比例至少為？",opts:["25%","49%","51%","75%"],ans:2,exp:"依《外人商業法》，漁業、農業等特定產業泰方須持股至少 51%。"},
{ch:6,n:9,stem:"泰國 BOI 在 2023-2027 年的投資促進策略中，強調的核心概念「不包含」下列何者？",opts:["創新與技術","快速適應能力","環境社會永續性","完全放棄國產化要求"],ans:3,exp:"BOI 2023–2027 策略強調創新、適應力與永續，並未「完全放棄國產化要求」。"},
{ch:6,n:10,stem:"下列哪一項屬於「產品技術」的內容？",opts:["廠房設計","產品設計","品質管制","行銷研究"],ans:1,exp:"產品設計屬產品技術；廠房設計、品管、行銷研究屬其他類別。"},
{ch:6,n:11,stem:"地主國政府對外資採取「財務限制」的目的是？",opts:["鼓勵技術移轉","限制利潤匯出或資本移動","提高生產效率","吸引更多投資"],ans:1,exp:"財務限制目的在限制利潤匯出或資本移動。"},
{ch:6,n:12,stem:"所謂「從量稅」是根據什麼標準課徵？",opts:["商品價格","商品件數或重量","進口國的匯率","廠商的利潤"],ans:1,exp:"從量稅依商品件數或重量課徵；依價格課徵的是從價稅。"},
{ch:6,n:13,stem:"泰國 BOI 提供哪兩類投資誘因？",opts:["融資與行政支援","減稅與非減稅誘因","土地贈與與出口補貼","技術授權與法律保障"],ans:1,exp:"BOI 提供「減稅」與「非減稅」兩類投資誘因。"},
{ch:6,n:14,stem:"下列何者是多國公司用來「討價還價」的手段之一？",opts:["沒收或國有化","與當地人合資","制定外資政策","限制入境許可"],ans:1,exp:"與當地人合資是多國公司用來討價還價、換取進入條件的手段。"},
{ch:6,n:15,stem:"採取貿易障礙的「產業轉型論」主要是為了？",opts:["確保國防安全","保護特定夕陽產業轉型","報復他國不公平競爭","增加財政收入"],ans:1,exp:"產業轉型論是為保護特定（夕陽）產業順利轉型。"},
{ch:6,n:16,stem:"下列何者不屬於「製程技術」？",opts:["機器和儀器之選擇","藍圖與規格","成品標準之檢驗","原料規格之設定"],ans:2,exp:"成品標準之檢驗屬產品技術；機器選擇、藍圖規格、原料規格屬製程技術。"},
{ch:6,n:17,stem:"地主國政府為何會對「出口」進行管制？",opts:["為了增加外匯收入","為了保護國家安全與外交政策","為了鼓勵國內消費","為了提高產品價格"],ans:1,exp:"管制出口多為保護國家安全與配合外交政策。"},
{ch:6,n:18,stem:"泰國 BOI 轉型為「推廣」單位的關鍵轉變發生在幾年？",opts:["1971 年","1985 年","1995 年","2023 年"],ans:2,exp:"泰國 BOI 於 1995 年轉型為「推廣」單位。"},
{ch:6,n:19,stem:"下列何者是「關稅障礙」的一種？",opts:["輸入許可","混合稅","外匯管制","原產地規定"],ans:1,exp:"混合稅（從量＋從價）屬關稅障礙；許可、外匯管制、原產地規定屬非關稅。"},
{ch:6,n:20,stem:"根據表 6.2，多國公司的目標「不包括」下列何者？",opts:["獲取利潤","銷售產品與服務","追求地主國主權獨立","社會責任"],ans:2,exp:"追求主權獨立是地主國政府的目標，並非多國公司的目標。"},
{ch:7,n:21,stem:"現代國際貨幣制度的演變，最後一個階段（1973年迄今）是？",opts:["金本位","布里敦森林制度","浮動匯率制度","歐元體制"],ans:2,exp:"1973 年迄今進入浮動匯率制度階段。"},
{ch:7,n:22,stem:"在金本位制度下，兩國貨幣兌換的比率由什麼決定？",opts:["市場供需","各國貨幣含金量的比率","美元匯率","國際貨幣基金決定"],ans:1,exp:"金本位下，兩國貨幣兌換比率由各自含金量比率決定。"},
{ch:7,n:23,stem:"1944 年布里敦森林會議決定設立哪兩個重要機構？",opts:["WTO 與 UN","IMF 與 世界銀行","APEC 與 ASEAN","FED 與 ECB"],ans:1,exp:"1944 年布里敦森林會議決定設立 IMF 與世界銀行。"},
{ch:7,n:24,stem:"布里敦森林制度（1944-1971）本質上屬於何種匯率制度？",opts:["自由浮動","管理浮動","固定匯率制度","金本位"],ans:2,exp:"布里敦森林制度本質為（可調整釘住的）固定匯率制度。"},
{ch:7,n:25,stem:"下列關於「特別提款權」(SDRs) 的敘述何者錯誤？",opts:["又稱「紙金」","由 IMF 創造","需有實體黃金做價值保證","是一種國際準備資產"],ans:2,exp:"SDR 為帳面準備資產（紙金），不需實體黃金做價值保證。"},
{ch:7,n:26,stem:"哪一位美國總統宣布停止美元兌換黃金，導致布里敦森林制度瓦解？",opts:["羅斯福","甘迺迪","尼克森","雷根"],ans:2,exp:"尼克森於 1971 年宣布停止美元兌換黃金，導致該制度瓦解。"},
{ch:7,n:27,stem:"所謂「管理浮動匯率」是指？",opts:["政府完全不干預","匯率鎖定黃金","政府透過央行干預以使變動平順","僅允許 1% 波動"],ans:2,exp:"管理浮動指政府透過央行干預，使匯率變動較為平順。"},
{ch:7,n:28,stem:"我國外匯市場採取的報價方式，如「購買1單位美元支付30.5元台幣」，稱為？",opts:["間接報價法","直接報價法","交叉報價法","點數報價法"],ans:1,exp:"以本國貨幣表示一單位外幣（付 30.5 台幣換 1 美元）為直接報價法。"},
{ch:7,n:29,stem:"「購買力平價理論」(PPP) 主要描述匯率與哪一項變數的關係？",opts:["利率","通貨膨脹率","失業率","經濟成長率"],ans:1,exp:"購買力平價理論（PPP）描述匯率與兩國通貨膨脹率的關係。"},
{ch:7,n:30,stem:"費雪效果 (Fisher Effect) 認為名目利率等於實質利率加上？",opts:["匯率變動率","通貨膨脹率","稅率","風險貼水"],ans:1,exp:"費雪效果：名目利率＝實質利率＋預期通貨膨脹率。"},
{ch:7,n:31,stem:"下列何者不屬於國際收支平衡表 (BOP) 的主要內容？",opts:["經常帳","資本帳","金融帳","損益帳"],ans:3,exp:"BOP 主要含經常帳、資本帳、金融帳；並無「損益帳」。"},
{ch:7,n:32,stem:"當匯率貶值時，對該國企業經營的影響通常是？",opts:["有利出口","有利進口","增加國外採購成本","A與C皆是"],ans:3,exp:"貶值同時有利出口、又增加國外採購成本，故 A 與 C 皆是。"},
{ch:7,n:33,stem:"「利率平價理論」(IRP) 認為兩國利率差距應等於？",opts:["通膨差距","遠期匯率升貼水幅度","經濟成長差距","黃金價格變動"],ans:1,exp:"利率平價理論（IRP）認為兩國利率差距等於遠期匯率升貼水幅度。"},

{ch:7,n:36,stem:"特別提款權 (SDR) 的價值目前是由五種貨幣構成，權數最高的是？",opts:["歐元","人民幣","美元","日圓"],ans:2,exp:"SDR 一籃子貨幣中，美元權數最高。"},

{ch:7,n:38,stem:"假如地主國匯率趨向「貶值」，多國公司應如何採取財務對策？",opts:["延後將資金匯回母公司","提前將子公司的資金匯出","增加對該子公司的注資","保持不動"],ans:1,exp:"地主國貨幣將貶值時，宜提前將子公司資金匯出以避免貶值損失。"},
{ch:7,n:39,stem:"「目標區間管理」匯率制度是指？",opts:["匯率釘住單一貨幣","僅允許匯率在較小範圍內變動，超標則央行干預","每天由政府公布匯率","由銀行同業協議匯率"],ans:1,exp:"目標區間管理僅允許匯率在較小範圍內變動，超標則央行干預。"},
{ch:7,n:40,stem:"國際費雪效果 (IFE) 結合了哪兩個理論？",opts:["PPP 與 費雪效果","IRP 與 PPP","凱因斯理論與金本位","貨幣主義與財政政策"],ans:0,exp:"國際費雪效果（IFE）結合 PPP 與費雪效果。"},
{ch:8,n:41,stem:"對於出口經驗較缺乏、資源有限的中小企業，最適合的初步外銷方式為？",opts:["直接外銷","間接外銷","獨資設廠","購併現有公司"],ans:1,exp:"資源有限、經驗不足的中小企業，宜先採風險較低的間接外銷。"},
{ch:8,n:42,stem:"日本最完善、最成功，經營產品上萬種的貿易服務組織稱為？",opts:["IPO","代理商","綜合商社 (Sogo Shosha)","背負者"],ans:2,exp:"日本經營上萬種產品的貿易服務組織為綜合商社（Sogo Shosha）。"},
{ch:8,n:43,stem:"關於「他人背負法」(Piggybacking) 的敘述，下列何者正確？",opts:["是由搭乘者負責國外行銷","由背負者替搭乘者在國外銷售產品","二者間必定有投資關係","必須使用搭乘者品牌"],ans:1,exp:"他人背負法是由背負者替搭乘者在國外銷售產品。"},
{ch:8,n:44,stem:"兩國廠商在進入對方國家市場時，若產品非直接競爭且互相代為行銷，稱之為？",opts:["市場含括","清算安排","交互背負","轉手貿易"],ans:2,exp:"產品非直接競爭、雙方互相代為行銷，稱為交互背負。"},
{ch:8,n:45,stem:"在以物易物貿易中，雙方設立清算帳戶並於時期終了結清差額的模式稱為？",opts:["清算安排","純粹以物易物","轉手貿易","對等購買"],ans:0,exp:"設清算帳戶並於期末結清差額者，為清算安排。"},
{ch:8,n:46,stem:"多國公司轉移技術或設備給開發中國家企業，後者以該設備生產的產品支付價款，稱為？",opts:["對等購買","回購 (Buyback)","對沖協議","補償貿易"],ans:1,exp:"以該設備所生產的產品支付價款，屬回購（Buyback）。"},
{ch:8,n:47,stem:"「對等購買」與「回購」最大的不同在於？",opts:["購回的產品與出口的設備無關","需涉及強勢貨幣","回購涉及技術移轉","對等購買不需簽訂契約"],ans:0,exp:"對等購買購回的產品與出口設備無關，是其與回購最大的差異。"},
{ch:8,n:48,stem:"所謂 OEM (代工生產) 模式中，供應商的主要職責是？",opts:["品牌行銷","產品設計","依買主規格代工組裝","市場調查"],ans:2,exp:"OEM 供應商主要依買主規格代工組裝。"},
{ch:8,n:49,stem:"當供應商除了提供製造服務外，也提供設計服務，則稱為？",opts:["OEM","ODM","OBM","EMS"],ans:1,exp:"供應商同時提供製造與設計服務者，稱為 ODM。"},
{ch:8,n:50,stem:"下列何種情況適合考慮採取「技術授權」進入市場？",opts:["欲建立品牌長期主導權","競爭者已進入，需爭取時效快速進入時","具備豐富的國際營運資源","技術尚未成熟"],ans:1,exp:"競爭者已進入、需爭取時效快速進入時，適合採技術授權。"},
{ch:8,n:51,stem:"關於「對外直接投資」(FDI)，合資與獨資最主要的差別在於？",opts:["投資金額的大小","股權的共享與否","設廠的地點選擇","產品的品質高低"],ans:1,exp:"合資與獨資最主要差別在於股權是否共享。"},
{ch:8,n:52,stem:"多國公司傾向選擇「獨資」而非「合資」的原因通常是？",opts:["分擔風險","獲取當地合夥人的資源","保護企業優勢與製程秘技","降低管理成本"],ans:2,exp:"傾向獨資多為保護企業優勢與製程秘技。"},
{ch:8,n:53,stem:"以獨資方式進入市場，若想「縮短進入市場的時間」，最常見的做法是？",opts:["新設公司 (Greenfield)","購併現有公司","技術授權","代理出口"],ans:1,exp:"購併現有公司可縮短進入市場的時間。"},

{ch:8,n:55,stem:"下列何者屬於影響進入模式決策的「外在環境因素」？",opts:["產品因素","資源投入因素","地主國市場因素","全球策略"],ans:2,exp:"地主國市場因素屬外在環境因素。"},
{ch:8,n:56,stem:"國際化程序學派認為，企業國際化通常是一個什麼樣的過程？",opts:["隨機且跳躍","漸進式的投入資源","優先選擇高度不確定的市場","一次性的大額投資"],ans:1,exp:"國際化程序學派主張企業漸進式投入資源。"},
{ch:8,n:57,stem:"下列何者不屬於國際化過程的典型四大型態？",opts:["無規則出口","代理出口","國際技術聯盟","國外生產"],ans:2,exp:"國際技術聯盟不屬國際化過程的典型四大型態。"},
{ch:8,n:58,stem:"與多國公司 (MNC) 相比，中小企業的競爭優勢在於？",opts:["資本密集技術","組織結構簡單、具彈性","廣泛的全球品牌力","大規模規模經濟"],ans:1,exp:"中小企業競爭優勢在於組織結構簡單、具彈性。"},
{ch:8,n:59,stem:"在美日合資類型中，日本公司以資金投資美國高科技小公司稱為？",opts:["再生型","收養型 (Adoption)","創造型","家庭關係型"],ans:1,exp:"日本以資金投資美國高科技小公司，屬收養型（Adoption）。"},
{ch:8,n:60,stem:"理想的合資人應具備的條件，根據日本企業經驗不包括？",opts:["對方是誠實可信賴的","活用合資人的長處","促成經營理念共識","必須完全聽從母公司指揮"],ans:3,exp:"理想合資人不應「必須完全聽從母公司指揮」。"},
{ch:9,n:61,stem:"組織結構的設計必須要配合企業的？",opts:["競爭對手與產品定價","策略和所面臨的環境","股東人數與董事會成員","工會組織"],ans:1,exp:"組織結構設計須配合企業的策略與所面臨的環境。"},
{ch:9,n:62,stem:"當國外業務佔比極低且尚在早期階段，通常由何種結構負責？",opts:["負責國內業務的部門指派專人","國際事業部","矩陣式結構","全球中心"],ans:0,exp:"國外業務佔比極低、尚早期時，多由國內部門指派專人負責。"},

{ch:9,n:67,stem:"多國公司面臨控制困難的特質不包括？",opts:["距離遠","市場多樣性","資源過剩","缺乏資訊"],ans:2,exp:"多國公司控制困難來自距離、多樣性、缺乏資訊；「資源過剩」並非其特質。"},
{ch:9,n:68,stem:"管理導向中，強調「集中決策於母公司」的模式稱為？",opts:["民族中心 (Ethnocentric)","多元中心 (Polycentric)","區域中心 (Regiocentric)","全球中心 (Geocentric)"],ans:0,exp:"集中決策於母公司屬民族中心（Ethnocentric）導向。"},

{ch:9,n:71,stem:"透過正式記錄和程序將決策例行化的控制方式稱為？",opts:["集權化","正式化 (Formalization)","社會化 (Socialization)","產業民主化"],ans:1,exp:"以正式記錄與程序將決策例行化，稱為正式化（Formalization）。"},

{ch:9,n:73,stem:"日本企業傾向於採取的控制型態通常是？",opts:["嚴密、外顯的正式控制","嚴密、內隱的非正式行為控制","鬆散且不加干預","單純以產出報告為主"],ans:1,exp:"日本企業傾向嚴密、內隱的非正式行為控制。"},
{ch:9,n:74,stem:"當子公司處於「早期發展階段」且高度仰賴母公司資源時，應採何種機制？",opts:["組織系絡機制","實質控制機制 (Substantive control)","放任管理","社會化管理"],ans:1,exp:"早期發展且高度仰賴母公司資源時，應採實質控制機制。"},
{ch:9,n:75,stem:"「組織系絡機制」通常建議用於何種階段的子公司？",opts:["剛成立、資源匱乏時","發展成熟、不再依賴總部資源時","虧損嚴重時","僅有出口業務時"],ans:1,exp:"組織系絡機制適用於發展成熟、不再依賴總部資源的子公司。"},
{ch:9,n:76,stem:"結構性與正式控制機制不包括？",opts:["組織部門化","規劃與產出控制","標準化程序","非正式溝通"],ans:3,exp:"非正式溝通不屬結構性與正式控制機制。"},
{ch:9,n:77,stem:"下列何者屬於「精緻且非正式」的控制機制？",opts:["社會化與平行關係","預算編製","集權與分權","績效考核表"],ans:0,exp:"社會化與平行關係屬精緻且非正式的控制機制。"},
{ch:9,n:78,stem:"美國企業在組織結構上偏好？",opts:["國際事業部","產品或區域別結構","無形控制","低度標準化"],ans:1,exp:"美國企業在組織結構上偏好產品或區域別結構。"},
{ch:9,n:79,stem:"台灣集團企業總部之地位類似多國公司的？",opts:["子公司","母公司 (或核心公司)","代理商","地主國政府"],ans:1,exp:"台灣集團企業總部地位類似多國公司的母公司（核心公司）。"},
{ch:9,n:80,stem:"國際化程度愈深，母公司的文化愈能為子公司接受，控制的重點將轉向？",opts:["強化正式規章","建立共同價值觀 (無形機制)","增加外部審計","縮減子公司自主權"],ans:1,exp:"國際化愈深，控制重點轉向建立共同價值觀（無形機制）。"},
{ch:10,n:81,stem:"子公司對多國公司的重要性在於？",opts:["是吸收地主國經驗與知識的來源","僅是銷售產品的工具","增加母公司的負債","減少母國的稅負"],ans:0,exp:"子公司是吸收地主國經驗與知識的重要來源。"},
{ch:10,n:82,stem:"根據 Jarillo and Martinez (1990)，「整合需求高」且「當地化程度高」的子公司屬於？",opts:["接收型","自主型","積極型 (Active)","奴隸型"],ans:2,exp:"整合需求高且當地化程度高者，屬積極型（Active）子公司。"},
{ch:10,n:83,stem:"關於「自主型子公司」，其特徵為？",opts:["內部整合需求高","內部整合需求低，但當地化程度高","與母公司高度互賴","資源完全由母公司提供"],ans:1,exp:"自主型子公司內部整合需求低，但當地化程度高。"},
{ch:10,n:84,stem:"Nohria and Ghoshal (1994) 將母子公司關係視為哪種契約關係？",opts:["合夥關係","老闆與員工 (主理人與代理人)","買賣關係","互助組織"],ans:1,exp:"Nohria & Ghoshal 視母子公司為主理人與代理人（老闆與員工）關係。"},
{ch:10,n:85,stem:"當子公司「擁有資源多」且「地主國環境複雜度高」時，集權程度應？",opts:["極高","低 (正式化程度中等)","鎖定為零","不需任何控制"],ans:1,exp:"資源多且環境複雜度高時，集權程度宜低（正式化中等）。"},
{ch:10,n:86,stem:"Taggart (1997) 分類中，「程序正義高」且「自主程度高」的子公司稱為？",opts:["好戰份子","奴隸","夥伴 (Partner)","合作者"],ans:2,exp:"Taggart 分類中，程序正義高且自主程度高者稱為夥伴（Partner）。"},
{ch:10,n:87,stem:"多國公司網絡理論中，「對等」(Reciprocity) 活動是指？",opts:["母公司單向給予","各成員間相互交換資源或消息","子公司必須歸還貸款","全球一致的定價"],ans:1,exp:"對等（Reciprocity）指各成員間相互交換資源或消息。"},

const CHAPTERS = {
  6: { name: "地主國政府之外資與外貿政策", range: "第 1-20 題" },
  7: { name: "國際金融環境", range: "第 21-40 題" },

  10: { name: "多國公司之母子公司關係", range: "第 81-100 題" },
  11: { name: "國際人力資源管理", range: "第 101-120 題" },
  12: { name: "國際財務管理", range: "第 121-140 題" },
  13: { name: "國際行銷管理", range: "第 141-160 題" },
  14: { name: "國際企業之未來", range: "第 161-180 題" }
};
const CHAPTER_LIST = [6, 7, 8, 9, 10, 11, 12, 13, 14];

const LETTERS = ["A", "B", "C", "D"];
const STORAGE_KEY = "ib_quiz_v1";

let state = { mode: null, queue: [], idx: 0, answered: false };
let progress = loadProgress();

function loadProgress() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const p = JSON.parse(raw);
      if (!p.history) p.history = {};
      if (!p.wrongIds) p.wrongIds = [];
      if (typeof p.totalAnswered !== 'number') p.totalAnswered = 0;
      if (typeof p.totalCorrect !== 'number') p.totalCorrect = 0;
      return p;
    }
  } catch (e) {}
  return { history: {}, wrongIds: [], totalAnswered: 0, totalCorrect: 0 };
}
function saveProgress() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(progress)); } catch (e) {}
}
function qid(q) { return String(q.n); }
function chapterName(q) { return CHAPTERS[q.ch] ? CHAPTERS[q.ch].name : ("第 " + q.ch + " 章"); }

function shuffle(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    const t = a[i]; a[i] = a[j]; a[j] = t;
  }
  return a;
}
function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, function (c) {
    return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c];
  });
}

function renderHome() {
  const total = QUESTIONS.length;
  const answered = progress.totalAnswered;
  const correct = progress.totalCorrect;
  const acc = answered > 0 ? Math.round(correct / answered * 100) : 0;
  const wrongCount = progress.wrongIds.length;

  let html = '<h1>\uD83C\uDF0F \u570B\u969B\u4F01\u696D\u7BA1\u7406\u5237\u984C</h1>';

  html += '<div class="stat-grid">';
  html += '<div class="stat-card"><div class="stat-label">\u7E3D\u984C\u6578</div><div class="stat-num">' + total + '</div></div>';
  html += '<div class="stat-card"><div class="stat-label">\u5DF2\u4F5C\u7B54</div><div class="stat-num">' + answered + '</div></div>';
  html += '<div class="stat-card"><div class="stat-label">\u6B63\u78BA\u7387</div><div class="stat-num">' + acc + '%</div></div>';
  html += '<div class="stat-card"><div class="stat-label">\u932F\u984C\u6578</div><div class="stat-num">' + wrongCount + '</div></div>';
  html += '</div>';

  html += '<div class="search-wrap">';
  html += '<input type="search" id="search-input" class="search-input" placeholder="\uD83D\uDD0D \u641C\u5C0B\u984C\u76EE\u95DC\u9375\u5B57..." autocomplete="off">';
  html += '<div id="search-results"></div>';
  html += '</div>';

  html += '<h2>\u9078\u64C7\u6A21\u5F0F</h2>';
  html += '<div class="mode-card" data-mode="chapter"><div class="mode-title">\uD83D\uDCD6 \u4F9D\u7AE0\u7BC0\u7DF4\u7FD2</div><div class="mode-desc">\u6311\u9078\u4E00\u7AE0\u4F9D\u5E8F\u7DF4\u7FD2</div></div>';
  html += '<div class="mode-card" data-mode="browse"><div class="mode-title">\uD83D\uDCCB \u700F\u89BD\u984C\u76EE</div><div class="mode-desc">\u4F9D\u7AE0\u7BC0\u9EDE\u9032\u53BB\uFF0C\u76F4\u63A5\u770B\u984C\u76EE\u3001\u7B54\u6848\u8207\u89E3\u6790</div></div>';

  const savedCount = parseInt(localStorage.getItem('ib_random_count') || '20');
  html += '<div class="mode-card-static"><div class="mode-title">\uD83C\uDFB2 \u96A8\u6A5F\u62BD\u984C</div>';
  html += '<div class="mode-desc">\u5F9E\u5168\u90E8 ' + total + ' \u984C\u96A8\u6A5F\u6D17\u724C\u51FA\u984C</div>';
  html += '<div class="count-row">';
  html += '<span class="count-label">\u984C\u6578</span>';
  html += '<div class="count-pills" id="count-pills">';
  [10, 20, 30, 50, total].forEach(function (n) {
    const label = n === total ? '\u5168\u90E8' : n;
    html += '<button class="count-pill ' + (n === savedCount ? 'active' : '') + '" data-count="' + n + '">' + label + '</button>';
  });
  html += '</div></div>';
  html += '<button class="btn-primary" id="start-random" style="margin-top: 12px;">\u958B\u59CB</button>';
  html += '</div>';

  html += '<div class="mode-card ' + (wrongCount === 0 ? 'disabled' : '') + '" data-mode="wrong">';
  html += '<div class="mode-title">\u274C \u932F\u984C\u8907\u7FD2' + (wrongCount > 0 ? ' (' + wrongCount + ')' : '') + '</div>';
  html += '<div class="mode-desc">' + (wrongCount > 0 ? '\u53EA\u770B\u4F60\u7B54\u932F\u904E\u7684\u984C\u76EE' : '\u76EE\u524D\u9084\u6C92\u6709\u932F\u984C') + '</div></div>';

  if (answered > 0) {
    html += '<button id="reset-btn" class="btn-secondary">\u6E05\u9664\u4F5C\u7B54\u7D00\u9304</button>';
  }

  document.getElementById('app').innerHTML = html;

  document.querySelectorAll('.mode-card').forEach(function (el) {
    el.addEventListener('click', function () {
      const mode = el.dataset.mode;
      if (mode === 'wrong' && wrongCount === 0) return;
      if (mode === 'chapter') renderChapterPicker();
      else if (mode === 'browse') renderBrowseChapters();
      else if (mode === 'wrong') {
        const wrongQs = QUESTIONS.filter(function (q) { return progress.wrongIds.indexOf(qid(q)) !== -1; });
        startQuiz('wrong', shuffle(wrongQs));
      }
    });
  });

  document.querySelectorAll('#count-pills .count-pill').forEach(function (pill) {
    pill.addEventListener('click', function () {
      document.querySelectorAll('#count-pills .count-pill').forEach(function (p) { p.classList.remove('active'); });
      pill.classList.add('active');
      localStorage.setItem('ib_random_count', pill.dataset.count);
    });
  });

  const startRandomBtn = document.getElementById('start-random');
  if (startRandomBtn) {
    startRandomBtn.addEventListener('click', function () {
      const activePill = document.querySelector('#count-pills .count-pill.active');
      const count = activePill ? parseInt(activePill.dataset.count) : 20;
      const picked = shuffle(QUESTIONS).slice(0, count);
      startQuiz('random', picked);
    });
  }

  const resetBtn = document.getElementById('reset-btn');
  if (resetBtn) {
    resetBtn.addEventListener('click', function () {
      if (confirm('\u78BA\u5B9A\u8981\u6E05\u9664\u6240\u6709\u4F5C\u7B54\u7D00\u9304\u55CE\uFF1F')) {
        progress = { history: {}, wrongIds: [], totalAnswered: 0, totalCorrect: 0 };
        saveProgress();
        renderHome();
      }
    });
  }

  const searchInput = document.getElementById('search-input');
  const searchResults = document.getElementById('search-results');
  if (searchInput) {
    searchInput.addEventListener('input', function () {
      const kw = searchInput.value.trim().toLowerCase();
      if (kw === '') { searchResults.innerHTML = ''; searchResults.style.display = 'none'; return; }
      const matches = QUESTIONS.filter(function (q) {
        const hay = (q.n + ' ' + q.stem + ' ' + q.opts.join(' ') + ' ' + q.exp).toLowerCase();
        return hay.indexOf(kw) !== -1;
      });
      if (matches.length === 0) {
        searchResults.innerHTML = '<div class="search-empty">\u627E\u4E0D\u5230\u7B26\u5408\u300C' + escapeHtml(kw) + '\u300D\u7684\u984C\u76EE</div>';
        searchResults.style.display = 'block';
        return;
      }
      let resHtml = '<div class="search-count">\u627E\u5230 ' + matches.length + ' \u984C</div>';
      const shown = matches.slice(0, 50);
      shown.forEach(function (q) {
        const preview = q.stem.length > 60 ? q.stem.slice(0, 60) + '...' : q.stem;
        const previewClean = preview.replace(/\n/g, ' ');
        resHtml += '<div class="search-item" data-id="' + qid(q) + '">';
        resHtml += '<div class="search-item-meta">\u7B2C ' + q.ch + ' \u7AE0 \u00B7 \u7B2C ' + q.n + ' \u984C</div>';
        resHtml += '<div class="search-item-stem">' + highlightKeyword(previewClean, kw) + '</div>';
        resHtml += '</div>';
      });
      if (matches.length > 50) {
        resHtml += '<div class="search-empty">\u50C5\u986F\u793A\u524D 50 \u984C\uFF0C\u8ACB\u8F38\u5165\u66F4\u7CBE\u78BA\u7684\u95DC\u9375\u5B57</div>';
      }
      searchResults.innerHTML = resHtml;
      searchResults.style.display = 'block';

      document.querySelectorAll('.search-item').forEach(function (item) {
        item.addEventListener('click', function () {
          const id = item.dataset.id;
          const q = QUESTIONS.find(function (x) { return qid(x) === id; });
          if (q) renderPreview(q, { list: shown, idx: shown.indexOf(q) });
        });
      });
    });
  }
}

function highlightKeyword(text, kw) {
  const escaped = escapeHtml(text);
  if (!kw) return escaped;
  const escKw = escapeHtml(kw);
  const regex = new RegExp(escKw.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'gi');
  return escaped.replace(regex, function (m) { return '<mark>' + m + '</mark>'; });
}

function renderPreview(q, ctx) {
  ctx = ctx || {};
  const back = ctx.back;
  const list = Array.isArray(ctx.list) ? ctx.list : null;
  const idx = (list && typeof ctx.idx === 'number') ? ctx.idx : -1;
  const hasNav = !!(list && idx >= 0);

  const status = progress.history[qid(q)];
  let statusBadge = '';
  if (status === 'correct') statusBadge = '<span class="badge badge-ok">\u5DF2\u7B54\u5C0D</span>';
  else if (status === 'wrong') statusBadge = '<span class="badge badge-no">\u66FE\u7B54\u932F</span>';

  let optsHtml = '';
  for (let i = 0; i < q.opts.length; i++) {
    const isAns = i === q.ans;
    optsHtml += '<div class="opt ' + (isAns ? 'correct' : '') + '" style="cursor: default;">';
    optsHtml += '<span class="opt-key">' + LETTERS[i] + '.</span>' + escapeHtml(q.opts[i]);
    optsHtml += '</div>';
  }

  const backLabel = back ? '\u2190 \u8FD4\u56DE\u6E05\u55AE' : '\u2190 \u8FD4\u56DE\u9996\u9801';
  let html = '<button id="back-btn" class="btn-back">' + backLabel + '</button>';
  html += '<div id="pv-wrap">';
  html += '<div class="meta-row"><span>\u7B2C ' + q.ch + ' \u7AE0 \u00B7 \u7B2C ' + q.n + ' \u984C \u00B7 ' + chapterName(q) + '</span>' + statusBadge + '</div>';
  html += '<div class="q-card">';
  html += '<div class="q-stem">' + escapeHtml(q.stem).replace(/\n/g, '<br>') + '</div>';
  html += '<div>' + optsHtml + '</div>';
  html += '<div class="explain"><b>\u6B63\u78BA\u7B54\u6848\uFF1A' + LETTERS[q.ans] + '</b>';
  html += escapeHtml(q.exp).replace(/\n/g, '<br>');
  html += '</div>';
  html += '</div>';
  if (hasNav) {
    html += '<div class="pv-nav">';
    html += '<button id="pv-prev"' + (idx <= 0 ? ' disabled' : '') + '>\u2190 \u4E0A\u4E00\u984C</button>';
    html += '<span class="pv-count">' + (idx + 1) + ' / ' + list.length + '</span>';
    html += '<button id="pv-next"' + (idx >= list.length - 1 ? ' disabled' : '') + '>\u4E0B\u4E00\u984C \u2192</button>';
    html += '</div>';
    html += '<div class="pv-hint">\u5DE6\u53F3\u6ED1\u52D5\u53EF\u5207\u63DB\u4E0A\u4E00\u984C / \u4E0B\u4E00\u984C</div>';
  }
  html += '</div>';

  document.getElementById('app').innerHTML = html;
  document.getElementById('back-btn').addEventListener('click', back || renderHome);

  if (hasNav) {
    const go = function (i) {
      if (i >= 0 && i < list.length) { renderPreview(list[i], { back: back, list: list, idx: i }); }
    };
    const pp = document.getElementById('pv-prev');
    if (pp) pp.addEventListener('click', function () { go(idx - 1); });
    const pn = document.getElementById('pv-next');
    if (pn) pn.addEventListener('click', function () { go(idx + 1); });

    const wrap = document.getElementById('pv-wrap');
    let sx = 0, sy = 0, st = 0;
    wrap.addEventListener('touchstart', function (e) {
      const t = e.changedTouches[0]; sx = t.clientX; sy = t.clientY; st = Date.now();
    }, { passive: true });
    wrap.addEventListener('touchend', function (e) {
      const t = e.changedTouches[0];
      const dx = t.clientX - sx, dy = t.clientY - sy, dt = Date.now() - st;
      if (dt < 800 && Math.abs(dx) > 50 && Math.abs(dx) > Math.abs(dy) * 1.5) {
        if (dx < 0) go(idx + 1); else go(idx - 1);
      }
    }, { passive: true });
  }
  window.scrollTo(0, 0);
}

function renderBrowseChapters() {
  let html = '<button id="back-btn" class="btn-back">\u2190 \u8FD4\u56DE</button>';
  html += '<h1>\uD83D\uDCCB \u700F\u89BD\u984C\u76EE</h1>';
  CHAPTER_LIST.forEach(function (ch) {
    const chQs = QUESTIONS.filter(function (q) { return q.ch === ch; });
    html += '<div class="mode-card" data-ch="' + ch + '">';
    html += '<div class="mode-title">\u7B2C ' + ch + ' \u7AE0 \u00B7 ' + CHAPTERS[ch].name + '</div>';
    html += '<div class="mode-desc">' + CHAPTERS[ch].range + ' \u00B7 ' + chQs.length + ' \u984C</div>';
    html += '</div>';
  });
  document.getElementById('app').innerHTML = html;
  document.getElementById('back-btn').addEventListener('click', renderHome);
  document.querySelectorAll('.mode-card').forEach(function (el) {
    el.addEventListener('click', function () { renderBrowseList(parseInt(el.dataset.ch)); });
  });
  window.scrollTo(0, 0);
}

function renderBrowseList(ch) {
  const chQs = QUESTIONS.filter(function (q) { return q.ch === ch; });
  let html = '<button id="back-btn" class="btn-back">\u2190 \u8FD4\u56DE\u7AE0\u7BC0</button>';
  html += '<div class="meta-row"><span>\u7B2C ' + ch + ' \u7AE0 \u00B7 ' + CHAPTERS[ch].name + '</span><span>\u5171 ' + chQs.length + ' \u984C</span></div>';
  chQs.forEach(function (q) {
    const st = progress.history[qid(q)];
    let badge = '';
    if (st === 'correct') badge = '<span class="badge badge-ok">\u7B54\u5C0D</span>';
    else if (st === 'wrong') badge = '<span class="badge badge-no">\u7B54\u932F</span>';
    const stem = q.stem.replace(/\n/g, ' ');
    const preview = stem.length > 50 ? stem.slice(0, 50) + '...' : stem;
    html += '<div class="search-item" data-id="' + qid(q) + '">';
    html += '<div class="search-item-meta">\u7B2C ' + q.n + ' \u984C' + (badge ? ' \u00B7 ' : '') + badge + '</div>';
    html += '<div class="search-item-stem">' + escapeHtml(preview) + '</div>';
    html += '</div>';
  });
  document.getElementById('app').innerHTML = html;
  document.getElementById('back-btn').addEventListener('click', renderBrowseChapters);
  document.querySelectorAll('.search-item').forEach(function (item) {
    item.addEventListener('click', function () {
      const q = QUESTIONS.find(function (x) { return qid(x) === item.dataset.id; });
      if (q) renderPreview(q, { back: function () { renderBrowseList(ch); }, list: chQs, idx: chQs.indexOf(q) });
    });
  });
  window.scrollTo(0, 0);
}

function renderChapterPicker() {
  let html = '<button id="back-btn" class="btn-back">\u2190 \u8FD4\u56DE</button>';
  html += '<h1>\u9078\u64C7\u7AE0\u7BC0</h1>';
  CHAPTER_LIST.forEach(function (ch) {
    const chQs = QUESTIONS.filter(function (q) { return q.ch === ch; });
    const answered = chQs.filter(function (q) { return progress.history[qid(q)]; }).length;
    const correct = chQs.filter(function (q) { return progress.history[qid(q)] === 'correct'; }).length;
    html += '<div class="mode-card" data-ch="' + ch + '">';
    html += '<div class="mode-title">\u7B2C ' + ch + ' \u7AE0 \u00B7 ' + CHAPTERS[ch].name + '</div>';
    html += '<div class="mode-desc">' + CHAPTERS[ch].range + ' \u00B7 ' + chQs.length + ' \u984C \u00B7 \u5DF2\u505A ' + answered + '/' + chQs.length + ' \u00B7 \u6B63\u78BA ' + correct + '</div>';
    html += '</div>';
  });
  document.getElementById('app').innerHTML = html;
  document.getElementById('back-btn').addEventListener('click', renderHome);
  document.querySelectorAll('.mode-card').forEach(function (el) {
    el.addEventListener('click', function () {
      const ch = parseInt(el.dataset.ch);
      const chQs = QUESTIONS.filter(function (q) { return q.ch === ch; });
      startQuiz('chapter-' + ch, chQs);
    });
  });
}

function startQuiz(mode, queue) {
  if (queue.length === 0) return;
  state = { mode: mode, queue: queue, idx: 0, answered: false };
  renderQuestion();
}

function renderQuestion() {
  const q = state.queue[state.idx];
  const total = state.queue.length;
  const progPct = Math.round(state.idx / total * 100);

  let modeLabel = '';
  if (state.mode === 'random') modeLabel = '\u96A8\u6A5F\u62BD\u984C';
  else if (state.mode === 'wrong') modeLabel = '\u932F\u984C\u8907\u7FD2';
  else if (state.mode.indexOf('chapter-') === 0) modeLabel = '\u7B2C ' + q.ch + ' \u7AE0';

  let optsHtml = '';
  for (let i = 0; i < q.opts.length; i++) {
    optsHtml += '<button class="opt" data-idx="' + i + '">';
    optsHtml += '<span class="opt-key">' + LETTERS[i] + '.</span>' + escapeHtml(q.opts[i]);
    optsHtml += '</button>';
  }

  let html = '<button id="back-btn" class="btn-back">\u2190 \u8FD4\u56DE\u9996\u9801</button>';
  html += '<div class="meta-row"><span>' + modeLabel + ' \u00B7 \u7B2C ' + (state.idx + 1) + ' / ' + total + ' \u984C</span><span>\u7B2C ' + q.ch + ' \u7AE0 \u00B7 \u7B2C ' + q.n + ' \u984C</span></div>';
  html += '<div class="progress-bar"><div class="progress-fill" style="width: ' + progPct + '%"></div></div>';
  html += '<div class="q-card">';
  html += '<div class="q-stem">' + escapeHtml(q.stem).replace(/\n/g, '<br>') + '</div>';
  html += '<div id="opts">' + optsHtml + '</div>';
  html += '<div id="explain-area"></div>';
  html += '<div id="btn-area"></div>';
  html += '</div>';

  document.getElementById('app').innerHTML = html;

  document.getElementById('back-btn').addEventListener('click', function () {
    if (state.answered || confirm('\u96E2\u958B\u5C07\u5931\u53BB\u9019\u6B21\u7DF4\u7FD2\u9032\u5EA6\uFF0C\u78BA\u5B9A\u8981\u8FD4\u56DE\uFF1F')) {
      renderHome();
    }
  });

  document.querySelectorAll('#opts .opt').forEach(function (btn) {
    btn.addEventListener('click', function () {
      if (state.answered) return;
      onAnswer(parseInt(btn.dataset.idx));
    });
  });
}

function onAnswer(chosen) {
  const q = state.queue[state.idx];
  const correct = chosen === q.ans;
  state.answered = true;

  const id = qid(q);
  const wasAnswered = !!progress.history[id];
  const prevCorrect = progress.history[id] === 'correct';
  progress.history[id] = correct ? 'correct' : 'wrong';
  if (!wasAnswered) {
    progress.totalAnswered++;
    if (correct) progress.totalCorrect++;
  } else {
    if (correct && !prevCorrect) progress.totalCorrect++;
    if (!correct && prevCorrect) progress.totalCorrect--;
  }
  if (correct) {
    progress.wrongIds = progress.wrongIds.filter(function (x) { return x !== id; });
  } else {
    if (progress.wrongIds.indexOf(id) === -1) progress.wrongIds.push(id);
  }
  saveProgress();

  document.querySelectorAll('#opts .opt').forEach(function (btn, i) {
    btn.disabled = true;
    if (i === q.ans) btn.classList.add('correct');
    else if (i === chosen) btn.classList.add('wrong');
  });

  let expHtml = '<div class="explain">';
  expHtml += '<b>' + (correct ? '\u2713 \u7B54\u5C0D\u4E86' : '\u2717 \u7B54\u932F\u4E86') + ' \u00B7 \u6B63\u78BA\u7B54\u6848\uFF1A' + LETTERS[q.ans] + '</b>';
  expHtml += escapeHtml(q.exp).replace(/\n/g, '<br>');
  expHtml += '</div>';
  document.getElementById('explain-area').innerHTML = expHtml;

  const isLast = state.idx === state.queue.length - 1;
  document.getElementById('btn-area').innerHTML = '<button id="next-btn" class="btn-primary">' + (isLast ? '\u5B8C\u6210' : '\u4E0B\u4E00\u984C \u2192') + '</button>';
  document.getElementById('next-btn').addEventListener('click', function () {
    if (isLast) renderComplete();
    else {
      state.idx++; state.answered = false; renderQuestion(); window.scrollTo(0, 0);
    }
  });
}

function renderComplete() {
  const total = state.queue.length;
  const correctCount = state.queue.filter(function (q) { return progress.history[qid(q)] === 'correct'; }).length;
  const acc = Math.round(correctCount / total * 100);

  let html = '<div class="complete">';
  html += '<div class="complete-title">\uD83C\uDF89 \u5B8C\u6210\u9019\u8F2A\u7DF4\u7FD2\uFF01</div>';
  html += '<div class="stat-grid" style="max-width: 320px; margin: 0 auto 20px;">';
  html += '<div class="stat-card"><div class="stat-label">\u7E3D\u984C\u6578</div><div class="stat-num">' + total + '</div></div>';
  html += '<div class="stat-card"><div class="stat-label">\u7B54\u5C0D</div><div class="stat-num">' + correctCount + '</div></div>';
  html += '<div class="stat-card"><div class="stat-label">\u6B63\u78BA\u7387</div><div class="stat-num">' + acc + '%</div></div>';
  html += '<div class="stat-card"><div class="stat-label">\u7B54\u932F</div><div class="stat-num">' + (total - correctCount) + '</div></div>';
  html += '</div>';
  html += '<button id="home-btn" class="btn-primary">\u56DE\u5230\u9996\u9801</button>';
  html += '</div>';

  document.getElementById('app').innerHTML = html;
  document.getElementById('home-btn').addEventListener('click', renderHome);
}

renderHome();
</script>
</body>
</html>
